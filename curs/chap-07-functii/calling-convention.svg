<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="270" viewBox="0 0 600 270">
  <rect width="600" height="270" fill="#fafafa"/>

  <text x="300" y="28" font-family="monospace" font-size="17" font-weight="bold" text-anchor="middle" fill="#212121">System V AMD64 ABI — Calling Convention</text>

  <!-- Integer/Pointer arguments -->
  <text x="30" y="60" font-family="monospace" font-size="13" font-weight="bold" fill="#1565C0">Integer / Pointer Arguments</text>

  <!-- Registers -->
  <rect x="30"  y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="65"  y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">rdi</text>

  <rect x="110" y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="145" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">rsi</text>

  <rect x="190" y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="225" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">rdx</text>

  <rect x="270" y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="305" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">rcx</text>

  <rect x="350" y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="385" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">r8</text>

  <rect x="430" y="70" width="70" height="34" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" rx="4"/>
  <text x="465" y="92" font-family="monospace" font-size="14" text-anchor="middle" fill="#1565C0" font-weight="bold">r9</text>

  <rect x="510" y="70" width="70" height="34" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" rx="4" stroke-dasharray="4,2"/>
  <text x="545" y="88" font-family="monospace" font-size="11" text-anchor="middle" fill="#3949AB">stack</text>
  <text x="545" y="101" font-family="monospace" font-size="10" text-anchor="middle" fill="#3949AB">(arg 7+)</text>

  <!-- Argument numbers -->
  <text x="65"  y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 1</text>
  <text x="145" y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 2</text>
  <text x="225" y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 3</text>
  <text x="305" y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 4</text>
  <text x="385" y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 5</text>
  <text x="465" y="122" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">arg 6</text>

  <!-- Return value -->
  <text x="30" y="150" font-family="monospace" font-size="13" font-weight="bold" fill="#2E7D32">Return Value</text>
  <rect x="30" y="158" width="70" height="34" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" rx="4"/>
  <text x="65"  y="180" font-family="monospace" font-size="14" text-anchor="middle" fill="#2E7D32" font-weight="bold">rax</text>
  <text x="115" y="180" font-family="monospace" font-size="12" fill="#555">(integer / pointer return value)</text>

  <!-- Callee-saved / Caller-saved -->
  <text x="30" y="215" font-family="monospace" font-size="12" font-weight="bold" fill="#b71c1c">Caller-saved (volatile):</text>
  <text x="220" y="215" font-family="monospace" font-size="12" fill="#333">rax, rdi, rsi, rdx, rcx, r8, r9, r10, r11</text>

  <text x="30" y="235" font-family="monospace" font-size="12" font-weight="bold" fill="#4527A0">Callee-saved (non-volatile):</text>
  <text x="245" y="235" font-family="monospace" font-size="12" fill="#333">rbx, rbp, r12–r15</text>

  <text x="30" y="258" font-family="monospace" font-size="11" fill="#888">The callee must preserve callee-saved registers; caller-saved registers may be clobbered.</text>
</svg>
