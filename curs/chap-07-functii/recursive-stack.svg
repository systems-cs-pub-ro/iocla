<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="400" viewBox="0 0 680 400">
  <rect width="680" height="400" fill="#fafafa"/>

  <text x="340" y="28" font-family="monospace" font-size="17" font-weight="bold" text-anchor="middle" fill="#212121">Recursive Call Stack: fibonacci(4)</text>

  <!-- Helper: draw a stack frame box -->
  <!-- fibonacci(4) -->
  <rect x="20" y="50" width="180" height="60" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="4"/>
  <text x="110" y="74" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#1565C0">fibonacci(4)</text>
  <text x="110" y="92" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">calls fib(3) then fib(2)</text>
  <text x="20" y="122" font-family="monospace" font-size="10" fill="#888">rbp → frame 4</text>

  <!-- fibonacci(3) -->
  <rect x="70" y="140" width="180" height="60" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="4"/>
  <text x="160" y="164" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#2E7D32">fibonacci(3)</text>
  <text x="160" y="182" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">calls fib(2) then fib(1)</text>
  <text x="70" y="212" font-family="monospace" font-size="10" fill="#888">rbp → frame 3</text>

  <!-- fibonacci(2) - under fib(3) -->
  <rect x="120" y="230" width="180" height="60" fill="#FFF9C4" stroke="#F9A825" stroke-width="2" rx="4"/>
  <text x="210" y="254" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#795548">fibonacci(2)</text>
  <text x="210" y="272" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">calls fib(1) then fib(0)</text>
  <text x="120" y="302" font-family="monospace" font-size="10" fill="#888">rbp → frame 2</text>

  <!-- fibonacci(1) - base case -->
  <rect x="170" y="320" width="180" height="50" fill="#FCE4EC" stroke="#C62828" stroke-width="2" rx="4"/>
  <text x="260" y="344" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle" fill="#b71c1c">fibonacci(1)</text>
  <text x="260" y="362" font-family="monospace" font-size="11" text-anchor="middle" fill="#555">base case → returns 1</text>

  <!-- Arrows (call) -->
  <line x1="160" y1="110" x2="160" y2="138" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="210" y1="200" x2="210" y2="228" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="290" x2="260" y2="318" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Stack depth indicator -->
  <text x="420" y="60" font-family="monospace" font-size="12" fill="#888" font-weight="bold">Return values unwind:</text>
  <text x="420" y="82" font-family="monospace" font-size="12" fill="#b71c1c">fib(0)=1, fib(1)=1</text>
  <text x="420" y="100" font-family="monospace" font-size="12" fill="#795548">fib(2)=fib(1)+fib(0)=2</text>
  <text x="420" y="118" font-family="monospace" font-size="12" fill="#2E7D32">fib(3)=fib(2)+fib(1)=3</text>
  <text x="420" y="136" font-family="monospace" font-size="12" fill="#1565C0">fib(4)=fib(3)+fib(2)=5</text>

  <!-- Stack memory representation -->
  <text x="420" y="175" font-family="monospace" font-size="12" fill="#555" font-weight="bold">Stack grows downward:</text>

  <rect x="420" y="185" width="200" height="32" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="520" y="206" font-family="monospace" font-size="11" text-anchor="middle" fill="#1565C0">frame: fibonacci(4)</text>

  <rect x="420" y="217" width="200" height="32" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="520" y="238" font-family="monospace" font-size="11" text-anchor="middle" fill="#2E7D32">frame: fibonacci(3)</text>

  <rect x="420" y="249" width="200" height="32" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="520" y="270" font-family="monospace" font-size="11" text-anchor="middle" fill="#795548">frame: fibonacci(2)</text>

  <rect x="420" y="281" width="200" height="32" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="520" y="302" font-family="monospace" font-size="11" text-anchor="middle" fill="#b71c1c">frame: fibonacci(1)</text>

  <line x1="625" y1="185" x2="645" y2="185" stroke="#aaa" stroke-width="1"/>
  <text x="648" y="189" font-family="monospace" font-size="9" fill="#888">high</text>
  <line x1="625" y1="313" x2="645" y2="313" stroke="#aaa" stroke-width="1"/>
  <text x="648" y="317" font-family="monospace" font-size="9" fill="#888">low</text>
  <line x1="635" y1="190" x2="635" y2="308" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <text x="420" y="340" font-family="monospace" font-size="11" fill="#888">Each call pushes return address + saved rbp.</text>
  <text x="420" y="358" font-family="monospace" font-size="11" fill="#888">Deep recursion may cause stack overflow.</text>
</svg>
