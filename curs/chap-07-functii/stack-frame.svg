<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="560" height="440" viewBox="0 0 560 440">
  <rect width="560" height="440" fill="#fafafa"/>

  <!-- Title -->
  <text x="280" y="28" font-family="monospace" font-size="17" font-weight="bold" text-anchor="middle" fill="#212121">Stack Frame Layout</text>

  <!-- Stack arrow label -->
  <text x="30" y="60" font-family="monospace" font-size="11" fill="#888">higher addresses</text>
  <text x="30" y="410" font-family="monospace" font-size="11" fill="#888">lower addresses</text>
  <line x1="15" y1="65" x2="15" y2="405" stroke="#aaa" stroke-width="1.5"/>
  <polygon points="15,405 11,395 19,395" fill="#aaa"/>

  <!-- Caller frame (above) -->
  <rect x="100" y="68" width="280" height="36" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="240" y="91" font-family="monospace" font-size="12" text-anchor="middle" fill="#1565C0">... caller's data ...</text>

  <!-- return address -->
  <rect x="100" y="104" width="280" height="36" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="240" y="127" font-family="monospace" font-size="12" text-anchor="middle" fill="#333" font-weight="bold">return address</text>
  <text x="385" y="127" font-family="monospace" font-size="10" fill="#888">← [rbp+8]</text>

  <!-- saved rbp -->
  <rect x="100" y="140" width="280" height="36" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="240" y="163" font-family="monospace" font-size="12" text-anchor="middle" fill="#2E7D32" font-weight="bold">saved rbp (old frame ptr)</text>
  <text x="385" y="163" font-family="monospace" font-size="10" fill="#888">← rbp  ← [rbp]</text>

  <!-- local var 1 -->
  <rect x="100" y="176" width="280" height="36" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="240" y="199" font-family="monospace" font-size="12" text-anchor="middle" fill="#333">local variable 1 (8 bytes)</text>
  <text x="385" y="199" font-family="monospace" font-size="10" fill="#888">← [rbp-8]</text>

  <!-- local var 2 -->
  <rect x="100" y="212" width="280" height="36" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="240" y="235" font-family="monospace" font-size="12" text-anchor="middle" fill="#333">local variable 2 (8 bytes)</text>
  <text x="385" y="235" font-family="monospace" font-size="10" fill="#888">← [rbp-16]</text>

  <!-- local var 3 -->
  <rect x="100" y="248" width="280" height="36" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text x="240" y="271" font-family="monospace" font-size="12" text-anchor="middle" fill="#333">local variable 3 (8 bytes)</text>
  <text x="385" y="271" font-family="monospace" font-size="10" fill="#888">← [rbp-24]</text>

  <!-- padding -->
  <rect x="100" y="284" width="280" height="36" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="240" y="307" font-family="monospace" font-size="12" text-anchor="middle" fill="#7B1FA2">padding (alignment)</text>
  <text x="385" y="307" font-family="monospace" font-size="10" fill="#888">← rsp (16-byte aligned)</text>

  <!-- rsp label -->
  <line x1="72" y1="302" x2="98" y2="302" stroke="#7B1FA2" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="42" y="306" font-family="monospace" font-size="11" fill="#7B1FA2" font-weight="bold">rsp</text>

  <!-- rbp label -->
  <line x1="72" y1="158" x2="98" y2="158" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="42" y="162" font-family="monospace" font-size="11" fill="#2E7D32" font-weight="bold">rbp</text>

  <!-- Prologue / Epilogue note -->
  <rect x="100" y="335" width="380" height="90" fill="none" stroke="#bbb" stroke-width="1" rx="4" stroke-dasharray="4,2"/>
  <text x="110" y="355" font-family="monospace" font-size="11" fill="#444" font-weight="bold">Prologue (function entry):</text>
  <text x="110" y="372" font-family="monospace" font-size="11" fill="#333">  push rbp          ; save caller's frame pointer</text>
  <text x="110" y="388" font-family="monospace" font-size="11" fill="#333">  mov rbp, rsp      ; set new frame pointer</text>
  <text x="110" y="404" font-family="monospace" font-size="11" fill="#333">  sub rsp, N        ; allocate N bytes for locals</text>

  <text x="110" y="422" font-family="monospace" font-size="11" fill="#444" font-weight="bold">Epilogue: </text>
  <text x="185" y="422" font-family="monospace" font-size="11" fill="#333">leave / ret  (or: mov rsp,rbp; pop rbp; ret)</text>
</svg>
